<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport"
			content="width=device-width, initial-scale=1.0">
		<title>Sign In</title>
		<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #080808;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #DBA657; }
    .subtitle { font-size: 0.875rem; color: #666; margin-bottom: 32px; }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #DBA657; }
    .otp-segmented-group { display: flex; gap: 8px; }
    .otp-segmented-group input {
      flex: 1;
      text-align: center;
      padding: 12px 4px;
      font-size: 1.25rem;
      font-weight: bold;
    }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #DBA657;
      color: #080808;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    button[type="submit"]:hover { opacity: 0.85; }
    #sso-btn {
      width: 100%;
      padding: 13px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #sso-btn:hover { background: #f0f0f0; }
    .error { color: #e55; font-size: 0.875rem; margin-top: 12px; min-height: 20px; }
    .hidden { display: none !important; }
    .divider { border: none; border-top: 1px solid #222; margin: 24px 0; }
  </style>
	</head>
	<body>
		<div class="card">
			<h1>Sign In</h1>
			<p class="subtitle"
				id="subtitle">
				Loading...
			</p>

			<!-- OAuth / OIDC / SAML button -->
			<div id="sso-section"
				class="hidden">
				<button id="sso-btn"
					type="button">

					<!-- Google -->
					<svg id="sso-icon-google"
						width="18"
						height="18"
						viewBox="0 0 18 18"
						class="hidden">
						<path fill="#4285F4"
							d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"></path>
						<path fill="#34A853"
							d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"></path>
						<path fill="#FBBC05"
							d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"></path>
						<path fill="#EA4335"
							d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"></path>
					</svg>

					<!-- Microsoft -->
					<svg id="sso-icon-microsoft"
						width="18"
						height="18"
						viewBox="0 0 21 21"
						class="hidden">
						<rect x="1"
							y="1"
							width="9"
							height="9"
							fill="#f25022"></rect>
						<rect x="11"
							y="1"
							width="9"
							height="9"
							fill="#7fba00"></rect>
						<rect x="1"
							y="11"
							width="9"
							height="9"
							fill="#00a4ef"></rect>
						<rect x="11"
							y="11"
							width="9"
							height="9"
							fill="#ffb900"></rect>
					</svg>

					<!-- GitHub -->
					<svg id="sso-icon-github"
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="#24292e"
						class="hidden">
						<path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"></path>
					</svg>

					<!-- LinkedIn -->
					<svg id="sso-icon-linkedin"
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="#0077b5"
						class="hidden">
						<path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path>
					</svg>

					<!-- Facebook -->
					<svg id="sso-icon-facebook"
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="#1877f2"
						class="hidden">
						<path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path>
					</svg>

					<!-- Fallback lock icon — shown for OIDC / SAML / unknown providers -->
					<svg id="sso-icon-generic"
						width="18"
						height="18"
						viewBox="0 0 24 24"
						fill="none"
						stroke="#555"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="hidden">
						<rect x="3"
							y="11"
							width="18"
							height="11"
							rx="2"
							ry="2"></rect>
						<path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
					</svg>

					<span id="sso-btn-label">Continue</span>
				</button>
			</div>

			<hr class="divider hidden"
				id="divider">

			<!-- Email field -->
			<div id="email-field"
				class="field hidden">
				<label for="email">Email address</label>
				<input data-testid="email"
					type="email"
					id="email"
					placeholder="you@example.com"
					autocomplete="email">
			</div>

			<!-- Password field -->
			<div id="password-field"
				class="field hidden">
				<label for="password">Password</label>
				<input data-testid="password"
					type="password"
					id="password"
					placeholder="Enter your password"
					autocomplete="current-password">
			</div>

			<!-- OTP — single text input.
      Used by otpUxMode "single-input" (same page, no navigation)
      and by otpUxMode "redirect-to-new-page" (served by otp.html). -->
			<div id="otp-single-field"
				class="field hidden">
				<label for="otp">Verification code</label>
				<input data-testid="otp"
					type="text"
					id="otp"
					placeholder="000000"
					maxlength="6"
					autocomplete="one-time-code">
			</div>

			<!-- OTP — segmented input (6 separate digit boxes).
      Used by otpUxMode "segmented". Always renders inline on the same page. -->
			<div id="otp-segmented-field"
				class="field hidden">
				<label>Verification code</label>
				<div class="otp-segmented-group">
					<input data-testid="otp-digit"
						type="text"
						maxlength="1">
					<input data-testid="otp-digit"
						type="text"
						maxlength="1">
					<input data-testid="otp-digit"
						type="text"
						maxlength="1">
					<input data-testid="otp-digit"
						type="text"
						maxlength="1">
					<input data-testid="otp-digit"
						type="text"
						maxlength="1">
					<input data-testid="otp-digit"
						type="text"
						maxlength="1">
				</div>
			</div>

			<button type="submit"
				id="submit-btn"
				class="hidden">
				Continue
			</button>

			<div class="error"
				id="error"></div>
		</div>

		<script>
			// ─── State ────────────────────────────────────────────────────────────────
    let config       = {};
    let currentStep  = "";
    let pendingEmail = "";
    let sessionToken = null;

    // ?provider=google|microsoft|github|linkedin|facebook
    // Passed by the server/test harness to control which SSO button is shown.
    const urlParams  = new URLSearchParams(window.location.search);
    const oauthProvider = (urlParams.get("provider") || "google").toLowerCase();

    // ─── OAuth provider registry ──────────────────────────────────────────────
    // Each entry drives the SSO button label, subtitle, icon, and auth URL.
    // Add new providers here — no other code needs to change.

    const OAUTH_PROVIDER_META = {
      google: {
        label:    "Continue with Google",
        subtitle: "Continue with your Google account",
        iconId:   "sso-icon-google",
        authUrl:  "/auth/oauth/authorize?provider=google",
        testId:   "button:has-text('Continue with Google')",
      },
      microsoft: {
        label:    "Continue with Microsoft",
        subtitle: "Continue with your Microsoft account",
        iconId:   "sso-icon-microsoft",
        authUrl:  "/auth/oauth/authorize?provider=microsoft",
        testId:   "button:has-text('Continue with Microsoft')",
      },
      github: {
        label:    "Continue with Github",
        subtitle: "Continue with your GitHub account",
        iconId:   "sso-icon-github",
        authUrl:  "/auth/oauth/authorize?provider=github",
        testId:   "button:has-text('Continue with Github')",
      },
      linkedin: {
        label:    "Continue with LinkedIn",
        subtitle: "Continue with your LinkedIn account",
        iconId:   "sso-icon-linkedin",
        authUrl:  "/auth/oauth/authorize?provider=linkedin",
        testId:   "button:has-text('Continue with LinkedIn')",
      },
      facebook: {
        label:    "Continue with Facebook",
        subtitle: "Continue with your Facebook account",
        iconId:   "sso-icon-facebook",
        authUrl:  "/auth/oauth/authorize?provider=facebook",
        testId:   "button:has-text('Continue with Facebook')",
      },
    };

    // Non-OAuth SSO types (OIDC, SAML) use the generic lock icon.
    const SSO_TYPE_META = {
      oidc: {
        label:   "Continue with OIDC",
        subtitle: "Continue with your OIDC provider",
        iconId:  "sso-icon-generic",
        authUrl: "/auth/oidc/authorize",
      },
      saml: {
        label:   "Continue with SAML SSO",
        subtitle: "Continue with your SAML provider",
        iconId:  "sso-icon-generic",
        authUrl: "/auth/saml/login",
      },
    };

    const SSO_FALLBACK_META = {
      label:   "Continue with SSO",
      subtitle: "Continue with single sign-on",
      iconId:  "sso-icon-generic",
      authUrl: "/auth/oauth/authorize",
    };

    // ─── DOM helpers ─────────────────────────────────────────────────────────
    const $          = (id)  => document.getElementById(id);
    const show       = (id)  => $(id).classList.remove("hidden");
    const hide       = (id)  => $(id).classList.add("hidden");
    const setError   = (msg) => { $("error").textContent = msg; };
    const clearError = ()    => { $("error").textContent = ""; };

    // All provider icon IDs — used to hide every icon before showing one.
    const ALL_SSO_ICON_IDS = [
      "sso-icon-google",
      "sso-icon-microsoft",
      "sso-icon-github",
      "sso-icon-linkedin",
      "sso-icon-facebook",
      "sso-icon-generic",
    ];

    // Returns the resolved metadata for the current authType + provider combo.
    function resolveSSSOMeta() {
      const { authType } = config;
      if (authType === "oidc" || authType === "saml") return SSO_TYPE_META[authType];
      if (authType === "oauth") return OAUTH_PROVIDER_META[oauthProvider] ?? SSO_FALLBACK_META;
      return SSO_FALLBACK_META;
    }

    function applySSOMeta() {
      const meta = resolveSSSOMeta();
      $("sso-btn-label").textContent = meta.label;
      $("subtitle").textContent      = meta.subtitle;
      ALL_SSO_ICON_IDS.forEach(hide);
      show(meta.iconId);
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function isSSOAuthType(authType) {
      return ["oauth", "oidc", "saml"].includes(authType);
    }

    // ─── Network ──────────────────────────────────────────────────────────────
    async function post(url, body) {
      const headers = { "Content-Type": "application/json" };
      if (sessionToken && config.tokenType === "bearer")
        headers["Authorization"] = `Bearer ${sessionToken}`;
      if (sessionToken && config.tokenType === "custom-header")
        headers[config.customHeaderName] = sessionToken;

      const res = await fetch(url, {
        method: "POST",
        headers,
        credentials: "include",
        body: JSON.stringify(body),
      });
      return { ok: res.ok, status: res.status, data: await res.json() };
    }

    function extractToken(data) {
      if (config.tokenType === "bearer")        sessionToken = data.accessToken;
      if (config.tokenType === "custom-header") sessionToken = data[config.customHeaderName];
    }

    function redirect() {
      if (config.tokenType !== "cookie" && sessionToken) {
        window.location.href = `/dashboard.html?token=${sessionToken}&tokenType=${config.tokenType}&headerName=${config.customHeaderName || ""}`;
      } else {
        window.location.href = "/dashboard.html";
      }
    }

    // ─── OTP value reader ─────────────────────────────────────────────────────
    function getOTPValue() {
      if (!$("otp-segmented-field").classList.contains("hidden")) {
        return Array.from(document.querySelectorAll("[data-testid='otp-digit']"))
          .map((i) => i.value)
          .join("");
      }
      return $("otp").value.trim();
    }

    // ─── Step renderers ───────────────────────────────────────────────────────
    function renderEmailOnly() {
      currentStep = "email";
      show("email-field");
      hide("password-field");
      hide("otp-single-field");
      hide("otp-segmented-field");
      hide("sso-section");
      show("submit-btn");
      $("submit-btn").textContent = "Continue";
      $("subtitle").textContent   = "Enter your email address";
      $("email").focus();
    }

    function renderEmailPassword() {
      currentStep = "email-password";
      show("email-field");
      show("password-field");
      hide("otp-single-field");
      hide("otp-segmented-field");
      hide("sso-section");
      show("submit-btn");
      $("submit-btn").textContent = "Sign In";
      $("subtitle").textContent   = "Sign in to your account";
    }

    function renderPasswordOnly() {
      currentStep = "password";
      hide("email-field");
      show("password-field");
      hide("otp-single-field");
      hide("otp-segmented-field");
      hide("sso-section");
      show("submit-btn");
      $("submit-btn").textContent = "Sign In";
      $("subtitle").textContent   = "Enter your password";
      $("password").focus();
    }

    function renderSSO() {
      currentStep = "sso";
      show("sso-section");
      hide("email-field");
      hide("password-field");
      hide("otp-single-field");
      hide("otp-segmented-field");
      hide("submit-btn");
      applySSOMeta();
    }

    // ─── Unified OTP renderer ─────────────────────────────────────────────────
    //
    //   "single-input"         → single text input appears on the same page.
    //                            For email-otp single-page: email stays visible.
    //                            For all other flows: email/password are hidden.
    //
    //   "redirect-to-new-page" → browser navigates to /otp.html?email=<email>.
    //
    //   "segmented"            → 6 digit boxes appear on the same page.
    //                            Same email-visibility rule as "single-input".

    function renderOTPStep(email) {
      if (config.otpUxMode === "redirect-to-new-page") {
        window.location.href = `/otp.html?email=${encodeURIComponent(email)}`;
        return;
      }

      currentStep = "otp";
      hide("sso-section");
      hide("password-field");

      // For email-otp single-page, keep the email field visible alongside
      // the OTP input. Every other flow hides email at this point.
      const keepEmail =
        config.authType === "email-otp" && config.authFlow === "single-page";
      keepEmail ? show("email-field") : hide("email-field");

      if (config.otpUxMode === "segmented") {
        show("otp-segmented-field");
        hide("otp-single-field");
        document.querySelector("[data-testid='otp-digit']")?.focus();
      } else {
        // "single-input" — one text field for the full code
        show("otp-single-field");
        hide("otp-segmented-field");
        $("otp").focus();
      }

      show("submit-btn");
      $("submit-btn").textContent = "Verify";
      $("subtitle").textContent   = "Check your email for a verification code";
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    function initUI() {
      const { authType, authFlow } = config;

      // OAuth / OIDC / SAML
      if (isSSOAuthType(authType)) {
        // progressive-reveal: collect email first, then reveal the SSO button.
        // single-page: show the SSO button immediately.
        authFlow === "progressive-reveal" ? renderEmailOnly() : renderSSO();
        return;
      }

      if (authType === "email-password") {
        authFlow === "single-page" ? renderEmailPassword() : renderEmailOnly();
        return;
      }

      // email-otp always starts with email only; OTP is requested after submit.
      if (authType === "email-otp") {
        renderEmailOnly();
        return;
      }

      if (authType === "email-password-otp") {
        authFlow === "single-page" ? renderEmailPassword() : renderEmailOnly();
        return;
      }

      renderEmailOnly();
    }

    // ─── Submit handler ───────────────────────────────────────────────────────
    $("submit-btn").addEventListener("click", async () => {
      clearError();
      const { authType } = config;
      const email    = $("email").value.trim();
      const password = $("password").value.trim();
      const otp      = getOTPValue();

      try {

        // ── OTP verification ────────────────────────────────────────────────
        // Unified across email-otp and email-password-otp.
        // pendingEmail is always set before we reach this step.
        if (currentStep === "otp") {
          const { ok, data } = await post("/auth/verify-otp", { email: pendingEmail, otp });
          if (!ok) return setError(data.error);
          extractToken(data);
          redirect();
          return;
        }

        // ── email-password ───────────────────────────────────────────────────
        if (authType === "email-password") {
          if (currentStep === "email") {
            // progressive-reveal: collect email, then show password field
            pendingEmail = email;
            renderPasswordOnly();
            return;
          }
          // currentStep "email-password" (single-page) or "password" (progressive-reveal)
          const { ok, data } = await post("/auth/login", {
            email: pendingEmail || email,
            password,
          });
          if (!ok) return setError(data.error);
          extractToken(data);
          redirect();
          return;
        }

        // ── email-otp ────────────────────────────────────────────────────────
        if (authType === "email-otp") {
          if (currentStep === "email") {
            pendingEmail = email;
            const { ok, data } = await post("/auth/request-otp", { email });
            if (!ok) return setError(data.error);
            renderOTPStep(email);
            return;
          }
        }

        // ── email-password-otp ───────────────────────────────────────────────
        if (authType === "email-password-otp") {
          if (currentStep === "email") {
            // progressive-reveal: collect email, then show password field
            pendingEmail = email;
            renderPasswordOnly();
            return;
          }
          if (currentStep === "email-password" || currentStep === "password") {
            const loginEmail = pendingEmail || email;
            const { ok, data } = await post("/auth/login", { email: loginEmail, password });
            if (!ok) return setError(data.error);
            pendingEmail = loginEmail;
            // Credentials accepted — now request and show OTP
            renderOTPStep(loginEmail);
            return;
          }
        }

        // ── SSO progressive-reveal: email collected → reveal SSO button ──────
        if (isSSOAuthType(authType) && currentStep === "email") {
          renderSSO();
          return;
        }

      } catch {
        setError("Something went wrong. Try again.");
      }
    });

    // ─── email-otp single-page: auto-request OTP on email blur ───────────────
    // Only fires for "single-input" and "segmented" modes.
    // "redirect-to-new-page" skips this — navigating on blur before the user
    // clicks Continue would be disorienting UX.
    $("email").addEventListener("blur", async () => {
      if (config.authType  !== "email-otp")               return;
      if (config.authFlow  !== "single-page")              return;
      if (config.otpUxMode === "redirect-to-new-page")    return;

      const email = $("email").value.trim();
      if (!email || pendingEmail === email)                return;

      pendingEmail = email;
      const { ok, data } = await post("/auth/request-otp", { email });
      if (!ok) return setError(data.error);
      renderOTPStep(email);
    });

    // ─── Enter key ────────────────────────────────────────────────────────────
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !$("submit-btn").classList.contains("hidden"))
        $("submit-btn").click();
    });

    // ─── SSO button: redirect to the resolved provider auth URL ──────────────
    $("sso-btn").addEventListener("click", () => {
      const meta = resolveSSSOMeta();
      window.location.href = meta.authUrl;
    });

    // ─── Segmented OTP: auto-advance on input / backspace to previous ─────────
    document.querySelectorAll("[data-testid='otp-digit']").forEach((input, i, all) => {
      input.addEventListener("input", () => {
        if (input.value && i < all.length - 1) all[i + 1].focus();
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && i > 0) all[i - 1].focus();
      });
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────
    (async () => {
      try {
        const res = await fetch("/api/config");
        config = await res.json();
        initUI();
      } catch {
        $("subtitle").textContent = "Could not load config. Is the server running?";
      }
    })();
		</script>
	</body>
</html>
