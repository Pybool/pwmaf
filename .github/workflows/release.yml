name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    name: Publish to npm, tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    permissions:
      contents: write   # push tag
      id-token: write   # npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git tag -l sees all tags

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Auth ──────────────────────────────────────────────────────────────
      # Write to ~/.npmrc (user-level) so the token is found regardless of
      # which directory npm resolves config from when using --workspace.
      - name: Authenticate with npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      # ── Determine bump type ───────────────────────────────────────────────
      - name: Determine bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?!?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      # ── Compute the next version from git tags ────────────────────────────
      # Tags (not package.json) are the source of truth for the last published
      # version, so we never need to commit back to the protected master branch.
      # Tags can be pushed directly even when branch protection is on.
      - name: Compute next version
        id: version
        run: |
          BUMP="${{ steps.bump.outputs.type }}"

          # Find the latest pwmaf-v* tag; fall back to package.json on first run.
          LATEST_TAG=$(git tag -l "pwmaf-v*" | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT=$(node -p "require('./packages/pwmaf/package.json').version")
            echo "No existing tag found — using package.json baseline: $CURRENT"
          else
            CURRENT="${LATEST_TAG#pwmaf-v}"
            echo "Latest tag: $LATEST_TAG — current version: $CURRENT"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Stamp the version into package.json for this build only ──────────
      # --no-git-tag-version: don't commit or tag — we handle the tag below.
      # This change is NOT pushed back to master (no commit, no PR needed).
      - name: Set version in packages/pwmaf
        working-directory: packages/pwmaf
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build package
        run: npm run build --workspace=packages/pwmaf

      # ── Publish ───────────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --workspace=packages/pwmaf --access public --provenance

      # ── Tag ───────────────────────────────────────────────────────────────
      # Tags bypass branch protection — only commits require a PR.
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "pwmaf-v${VERSION}"
          git push origin "pwmaf-v${VERSION}"
