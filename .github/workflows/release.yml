name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    name: Bump version, publish to npm, tag
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No registry-url here — we configure auth manually below so it
          # works regardless of which directory npm resolves .npmrc from.
          cache: npm

      - run: npm ci

      # ── Auth ────────────────────────────────────────────────────────────
      # Write the token to ~/.npmrc (user-level). npm always checks here
      # before any project-level .npmrc, so --workspace publishes from a
      # subdirectory won't lose the token.
      - name: Authenticate with npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      # ── Determine bump type ─────────────────────────────────────────────
      - name: Determine bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMIT_MSG" | grep -qE "^feat(\(.+\))?!?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      # ── Bump package.json only (no git tag yet) ─────────────────────────
      - name: Bump version in packages/pwmaf
        working-directory: packages/pwmaf
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      # ── Read the new version ─────────────────────────────────────────────
      - name: Read version
        run: |
          VERSION=$(node -p "require('./packages/pwmaf/package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Commit the bumped package.json back to master ────────────────────
      # [skip ci] stops CI re-triggering on this bot commit, which would
      # otherwise fire another Release run via workflow_run.
      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/pwmaf/package.json
          git add package-lock.json || true
          git commit -m "chore(release): bump pwmaf to v${VERSION} [skip ci]"
          git push origin master

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build package
        run: npm run build --workspace=packages/pwmaf

      # ── Publish ───────────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --workspace=packages/pwmaf --access public --provenance

      # ── Tag ───────────────────────────────────────────────────────────────
      - name: Create and push tag
        run: |
          git tag "pwmaf-v${VERSION}"
          git push origin "pwmaf-v${VERSION}"